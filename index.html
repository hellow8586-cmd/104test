<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>104 生涯興趣測驗 - 探索你的名人基因</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Core Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* 針對 iPad 優化，確保內容不被切掉 */
        .min-h-screen-safe { min-height: 100vh; min-height: -webkit-fill-available; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createElement } = React;

        // 自定義圖示組件，解決 lucide-react CDN 加載問題
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- 資料定義 ---
        const RIASEC_TYPES = {
            R: { name: '實作型', color: '#EF4444', gradient: 'from-red-400 to-red-600', icon: 'settings', desc: '喜歡親身體驗、動手操作，擅長按照規則，製造出具體的成品。' },
            I: { name: '研究型', color: '#3B82F6', gradient: 'from-blue-400 to-blue-600', icon: 'lightbulb', desc: '喜歡獨立自主，對事物充滿好奇心；擅於觀察，做事追根究底。' },
            A: { name: '藝術型', color: '#EAB308', gradient: 'from-yellow-400 to-yellow-600', icon: 'palette', desc: '喜歡追求自由、熱情奔放，直覺敏銳，思考充滿創意與想像力。' },
            S: { name: '社會型', color: '#10B981', gradient: 'from-emerald-400 to-emerald-600', icon: 'users', desc: '喜歡與人群互動，重視他人的需求與感受，在乎人際間的和諧。' },
            E: { name: '企業型', color: '#F97316', gradient: 'from-orange-400 to-orange-600', icon: 'bar-chart', desc: '樂觀積極，行處事果決，具有自信心、企圖心，喜歡影響他人。' },
            C: { name: '事務型', color: '#A855F7', gradient: 'from-purple-400 to-purple-600', icon: 'user', desc: '做事精準、追求完美，有組織有條理，喜歡按部就班完成目標。' },
        };

        const RADAR_ORDER = ['I', 'A', 'S', 'E', 'C', 'R'];

        const CELEBRITIES = {
            'RI': { displayName: '萊特兄弟', title: '飛機發明家', similar: ['瓦特', '愛迪生'], complement: ['宮崎駿', '奈良美智'], percentage: 5 },
            'RA': { displayName: '江振誠', title: '米其林主廚', similar: ['齊柏林', '達文西'], complement: ['高斯', '張忠謀'], percentage: 6 },
            'RS': { displayName: '楊力州', title: '紀錄片導演', similar: ['南丁格爾', '宮崎駿'], complement: ['郭台銘', '馬斯克'], percentage: 4 },
            'IR': { displayName: '愛迪生', title: '發明大王', similar: ['萊特兄弟', '瓦特'], complement: ['J.K.羅琳', '華特迪士尼'], percentage: 8 },
            'IA': { displayName: '賈伯斯', title: '蘋果創辦人', similar: ['達文西', '張忠謀'], complement: ['南丁格爾', '孔子'], percentage: 12 },
            'IS': { displayName: '神農', title: '草藥醫學始祖', similar: ['佛洛伊德', '愛迪生'], complement: ['郭台銘', '半澤直樹'], percentage: 3 },
            'AR': { displayName: '齊柏林', title: '看見台灣導演', similar: ['江振誠', '宮崎駿'], complement: ['高斯', '瓦特'], percentage: 7 },
            'AI': { displayName: '達文西', title: '全才藝術家', similar: ['賈伯斯', '宮崎駿'], complement: ['孔子', '半澤直樹'], percentage: 10 },
            'AS': { displayName: '宮崎駿', title: '動畫大師', similar: ['奈良美智', '齊柏林'], complement: ['張忠謀', '郭台銘'], percentage: 15 },
            'SR': { displayName: '南丁格爾', title: '白衣天使', similar: ['楊力州', '佛洛伊德'], complement: ['賈伯斯', '郭台銘'], percentage: 9 },
            'SI': { displayName: '佛洛伊德', title: '心理學家', similar: ['神農', '南丁格爾'], complement: ['瓦特', '萊特兄弟'], percentage: 6 },
            'SA': { displayName: '奈良美智', title: '當代藝術家', similar: ['宮崎駿', '佛洛伊德'], complement: ['瓦特', '亨利·福特'], percentage: 12 },
            'ER': { displayName: '郭台銘', title: '鴻海創辦人', similar: ['張忠謀', '華特迪士尼'], complement: ['奈良美智', '齊柏林'], percentage: 11 },
            'EI': { displayName: '張忠謀', title: '台積電創辦人', similar: ['郭台銘', '賈伯斯'], complement: ['宮崎駿', '達文西'], percentage: 13 },
            'EA': { displayName: '華特迪士尼', title: '樂園創辦人', similar: ['郭台銘', '宮崎駿'], complement: ['瓦特', '愛迪生'], percentage: 10 },
            'CR': { displayName: '瓦特', title: '蒸汽機改良者', similar: ['萊特兄弟', '高斯'], complement: ['宮崎駿', '奈良美智'], percentage: 7 },
            'CI': { displayName: '高斯', title: '數學王子', similar: ['瓦特', '張忠謀'], complement: ['達文西', '齊柏林'], percentage: 5 },
            'CA': { displayName: 'J.K.羅琳', title: '哈利波特作者', similar: ['宮崎駿', '達文西'], complement: ['萊特兄弟', '瓦特'], percentage: 9 },
            'Default': { displayName: '半澤直樹', title: '正義銀行員', similar: ['張忠謀', '孔子'], complement: ['畢卡索', '宮崎駿'], percentage: 7 }
        };

        const QUESTIONS = [
            {
                id: 1,
                title: '第一天到教室，你想 PO 文紀念開學，會替自拍照添加哪些標籤？',
                bgColor: 'bg-slate-50',
                intensities: ['最像我', '很像我', '像我'],
                requiredSelections: 3,
                options: [
                    { text: '#手作操作', type: 'R' }, { text: '#善於分析', type: 'I' }, { text: '#創意發想', type: 'A' },
                    { text: '#重視和諧', type: 'S' }, { text: '#領導他人', type: 'E' }, { text: '#生活規律', type: 'C' },
                    { text: '#理性思考', type: 'I' }, { text: '#偏好直覺', type: 'A' }, { text: '#影響他人', type: 'E' },
                    { text: '#按部就班', type: 'C' }, { text: '#內向寡言', type: 'I' }, { text: '#善解人意', type: 'S' }
                ]
            },
            {
                id: 2,
                title: '老師請大家自我介紹，你覺得「他人眼中」的你是什麼樣子的？',
                bgColor: 'bg-slate-50',
                intensities: ['最像我', '很像我', '像我'],
                requiredSelections: 3,
                options: [
                    { text: '愛好自然', type: 'R' }, { text: '邏輯推理', type: 'I' }, { text: '與眾不同', type: 'A' }, { text: '溫暖助人', type: 'S' },
                    { text: '有說服力', type: 'E' }, { text: '井然有序', type: 'C' }, { text: '為人耿直', type: 'R' }, { text: '好奇心強', type: 'I' },
                    { text: '想法多元', type: 'A' }, { text: '友善親切', type: 'S' }, { text: '富有活力', type: 'E' }, { text: '重視效率', type: 'C' }
                ]
            },
            {
                id: 3,
                title: '下課時同學問：「你有什麼能廢寢忘食的興趣呢？」',
                bgColor: 'bg-slate-50',
                intensities: ['最常做', '經常做', '常做'],
                requiredSelections: 3,
                options: [
                    { text: '運動/健身', type: 'R' }, { text: '舞蹈/影劇', type: 'A' }, { text: '自然/生醫', type: 'I' },
                    { text: '科技/科學', type: 'I' }, { text: '棋牌/遊戲', type: 'C' }, { text: '音樂/音響', type: 'A' },
                    { text: '繪圖/動漫', type: 'A' }, { text: '家政/工藝', type: 'R' }, { text: '語文/演說', type: 'E' },
                    { text: '領導/商業', type: 'E' }, { text: '助人/心靈', type: 'S' }, { text: '收藏/彙整', type: 'C' }
                ]
            },
            {
                id: 4,
                title: '你會如何排序 5 個最想上的選修課程？',
                bgColor: 'bg-slate-50',
                intensities: ['無敵想上', '超級想上', '非常想上', '很想上', '想上'],
                requiredSelections: 5,
                options: [
                    { text: '國文', type: 'A' }, { text: '英文', type: 'S' }, { text: '數學', type: 'I' }, { text: '物理', type: 'I' },
                    { text: '化學', type: 'I' }, { text: '生物', type: 'I' }, { text: '地理', type: 'C' }, { text: '體育', type: 'R' },
                    { text: '資訊科技', type: 'I' }, { text: '生活科技', type: 'R' }, { text: '音樂', type: 'A' }, { text: '美術', type: 'A' },
                    { text: '歷史', type: 'C' }, { text: '公民', type: 'S' }, { text: '家政', type: 'R' }
                ]
            },
            {
                id: 5,
                title: '最後要選班級幹部，老師問：「你有擔任過班級幹部嗎？」',
                bgColor: 'bg-slate-50',
                requiredSelections: 1,
                options: [
                    { text: '有，擔任過主要負責人 ( 如：社長、班長 )', type: 'E', points: 20 },
                    { text: '有，擔任過一般幹部 ( 如：學藝、風紀 )', type: 'S', points: 15 },
                    { text: '沒有擔任過幹部', type: 'C', points: 5 }
                ]
            }
        ];

        // --- 雷達圖組件 ---
        const RadarChart = ({ scores }) => {
            const size = 300;
            const center = size / 2;
            const radius = 90;
            const maxValue = Math.max(...Object.values(scores), 20);

            const getCoordinates = (index, value) => {
                const angle = (Math.PI * 2 * index) / 6 - Math.PI / 2;
                const r = (value / maxValue) * radius;
                return {
                    x: center + r * Math.cos(angle),
                    y: center + r * Math.sin(angle)
                };
            };

            const axisPoints = RADAR_ORDER.map((_, i) => getCoordinates(i, maxValue));
            const dataPoints = RADAR_ORDER.map((type, i) => getCoordinates(i, scores[type]));
            const polylinePoints = dataPoints.map(p => `${p.x},${p.y}`).join(' ');
            const gridLines = [0.25, 0.5, 0.75, 1].map(scale => {
                return RADAR_ORDER.map((_, i) => {
                    const p = getCoordinates(i, maxValue * scale);
                    return `${p.x},${p.y}`;
                }).join(' ');
            });

            return (
                <div className="flex flex-col items-center">
                    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="max-w-full h-auto drop-shadow-sm">
                        {gridLines.map((points, i) => (
                            <polygon key={i} points={points} fill="none" stroke="#E2E8F0" strokeWidth="1" strokeDasharray={i < 3 ? "4 4" : "0"} />
                        ))}
                        {axisPoints.map((p, i) => (
                            <line key={i} x1={center} y1={center} x2={p.x} y2={p.y} stroke="#E2E8F0" strokeWidth="1" />
                        ))}
                        <polygon 
                            points={polylinePoints} 
                            fill="rgba(249, 115, 22, 0.15)" 
                            stroke="#F97316" 
                            strokeWidth="3" 
                            strokeLinejoin="round"
                        />
                        {RADAR_ORDER.map((type, i) => {
                            const p = getCoordinates(i, maxValue + 30);
                            return (
                                <g key={type}>
                                    <text x={p.x} y={p.y} textAnchor="middle" className="text-[12px] font-bold fill-slate-500">
                                        {type}{RIASEC_TYPES[type].name}
                                    </text>
                                </g>
                            );
                        })}
                    </svg>
                </div>
            );
        };

        // --- 主應用程式 ---
        const App = () => {
            const [step, setStep] = useState('landing');
            const [currentQIdx, setCurrentQIdx] = useState(0);
            const [scores, setScores] = useState({ R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 });
            const [userName, setUserName] = useState('');
            const [selectionProgress, setSelectionProgress] = useState([]);
            const [history, setHistory] = useState([]);

            const currentQuestion = QUESTIONS[currentQIdx];

            const handleSelectOption = (optionIndex) => {
                if (selectionProgress.includes(optionIndex)) return;

                setHistory([...history, {
                    currentQIdx,
                    scores: { ...scores },
                    selectionProgress: [...selectionProgress]
                }]);

                const option = currentQuestion.options[optionIndex];
                const intensityIdx = selectionProgress.length;
                const maxIntensities = currentQuestion.intensities ? currentQuestion.intensities.length : 1;
                const weight = maxIntensities - intensityIdx;
                const basePoints = option.points || 10;

                setScores(prev => ({
                    ...prev,
                    [option.type]: prev[option.type] + (basePoints * weight)
                }));

                const newProgress = [...selectionProgress, optionIndex];
                
                if (newProgress.length < (currentQuestion.requiredSelections || 1)) {
                    setSelectionProgress(newProgress);
                } else {
                    if (currentQIdx < QUESTIONS.length - 1) {
                        setCurrentQIdx(currentQIdx + 1);
                        setSelectionProgress([]);
                    } else {
                        setStep('result');
                    }
                }
            };

            const handleBack = () => {
                if (history.length === 0) return;
                const lastState = history[history.length - 1];
                setCurrentQIdx(lastState.currentQIdx);
                setScores(lastState.scores);
                setSelectionProgress(lastState.selectionProgress);
                setHistory(history.slice(0, -1));
            };

            const getResultData = () => {
                const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
                const primary = sorted[0][0];
                const secondary = sorted[1][0];
                const code = primary + secondary;
                const celeb = CELEBRITIES[code] || CELEBRITIES[secondary + primary] || CELEBRITIES['Default'];
                
                const desc = (primary === 'S' && secondary === 'A') 
                    ? "待人和善、情感豐富，會傾聽別人的心聲，重視個人與團體的契合度。天生具有敏銳的直覺與創意，能運用藝術創作表達。"
                    : `你展現出明顯的「${RIASEC_TYPES[primary].name}」與「${RIASEC_TYPES[secondary].name}」特質。${RIASEC_TYPES[primary].desc} 這讓你能在特定領域中脫穎而出。`;

                return { ...celeb, code, primary, secondary, description: desc };
            };

            const reset = () => {
                setStep('landing');
                setCurrentQIdx(0);
                setScores({ R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 });
                setSelectionProgress([]);
                setHistory([]);
            };

            return (
                <div className="min-h-screen bg-[#F8FAFC] flex flex-col antialiased">
                    <header className="flex justify-between items-center p-4 md:px-8 md:py-5 bg-white shadow-sm border-b sticky top-0 z-50 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 bg-gradient-to-br from-orange-400 to-orange-600 rounded-xl flex items-center justify-center text-white font-black text-xs shadow-md shadow-orange-100">104</div>
                            <span className="font-black text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600">生涯興趣測驗</span>
                        </div>
                        <div className="flex items-center gap-4">
                            {step === 'quiz' && (
                                <div className="flex items-center gap-2">
                                    <div className="hidden md:block w-24 h-2 bg-slate-100 rounded-full overflow-hidden">
                                        <div className="h-full bg-orange-500 transition-all duration-500" style={{ width: `${(currentQIdx / QUESTIONS.length) * 100}%` }}></div>
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-400">進度 {Math.round((currentQIdx / QUESTIONS.length) * 100)}%</span>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col w-full max-w-6xl mx-auto p-4 md:p-8 overflow-hidden">
                        {step === 'landing' && (
                            <div className="flex-1 flex flex-col items-center justify-center text-center animate-in max-w-2xl mx-auto">
                                <h1 className="text-4xl md:text-6xl font-black text-slate-900 leading-tight mb-6">探尋你靈魂裡的<br /><span className="text-orange-500">名人基因</span></h1>
                                <p className="text-slate-500 text-lg md:text-xl mb-10 leading-relaxed max-w-lg">只需輸入暱稱，即可開始 5 個精心設計的開學情境，解析你的生涯發展路徑。</p>
                                
                                <div className="w-full bg-white p-8 md:p-12 rounded-[48px] shadow-2xl border border-slate-100 relative overflow-hidden group">
                                    <input 
                                        type="text" 
                                        placeholder="請輸入你的暱稱"
                                        className="w-full p-5 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-orange-400 outline-none text-center mb-6 text-xl font-bold transition-all"
                                        value={userName}
                                        onChange={(e) => setUserName(e.target.value)}
                                    />
                                    <button 
                                        disabled={!userName}
                                        onClick={() => setStep('quiz')}
                                        className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl disabled:opacity-30 text-xl flex items-center justify-center gap-3 active:scale-95 transition-transform"
                                    >
                                        立即展開測驗 <Icon name="arrow-right" size={24} />
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="flex-1 flex flex-col bg-white rounded-[48px] shadow-2xl border border-slate-100 overflow-hidden relative">
                                <div className="p-6 md:px-10 md:py-8 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-10 border-b border-slate-50">
                                    {history.length > 0 ? (
                                        <button onClick={handleBack} className="p-3 bg-slate-50 hover:bg-slate-100 rounded-2xl transition-all group">
                                            <Icon name="chevron-left" size={24} className="text-slate-600 group-hover:-translate-x-1 transition-transform" />
                                        </button>
                                    ) : <div className="w-12 h-12"></div>}
                                    
                                    <div className="flex flex-col items-center">
                                        <span className="text-[10px] font-black text-slate-300 tracking-widest uppercase mb-1">情境 {currentQIdx + 1} / {QUESTIONS.length}</span>
                                        <div className="flex gap-1.5">
                                            {QUESTIONS.map((_, i) => (
                                                <div key={i} className={`h-1.5 rounded-full transition-all duration-500 ${i === currentQIdx ? 'w-8 bg-orange-500' : i < currentQIdx ? 'w-4 bg-slate-200' : 'w-2 bg-slate-100'}`}></div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="w-12 h-12"></div>
                                </div>

                                <div className="flex-1 overflow-y-auto px-6 md:px-12 py-8 flex flex-col">
                                    <div className="text-center max-w-2xl mx-auto mb-10">
                                        <h2 className="text-2xl md:text-3xl font-black text-slate-800 leading-tight mb-8">{currentQuestion.title}</h2>
                                        {currentQuestion.intensities && (
                                            <div className="inline-flex items-center gap-2 bg-orange-50 border border-orange-100 px-6 py-3 rounded-2xl">
                                                <span className="text-xs font-black text-orange-400 uppercase tracking-tighter">當前志願</span>
                                                <span className="text-lg font-black text-orange-600">{currentQuestion.intensities[selectionProgress.length]}</span>
                                            </div>
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 max-w-5xl mx-auto w-full pb-8">
                                        {currentQuestion.options.map((opt, i) => {
                                            const isPicked = selectionProgress.includes(i);
                                            return (
                                                <button
                                                    key={i}
                                                    disabled={isPicked}
                                                    onClick={() => handleSelectOption(i)}
                                                    className={`group relative p-6 md:p-8 rounded-[32px] text-lg font-bold transition-all border-2 flex flex-col items-center justify-center gap-3 h-full
                                                        ${isPicked 
                                                            ? 'bg-slate-50 border-slate-100 text-slate-300 opacity-40 cursor-not-allowed' 
                                                            : 'bg-white border-slate-50 hover:border-orange-400 hover:shadow-xl hover:shadow-orange-100/30 text-slate-700 active:scale-95'
                                                        } ${currentQuestion.id === 5 ? 'col-span-full py-10' : ''}`}
                                                >
                                                    <span className="relative z-10">{opt.text}</span>
                                                    {isPicked && <span className="absolute top-4 right-4 bg-slate-200 text-[10px] px-2 py-0.5 rounded-full text-slate-500 font-black">已選擇</span>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 'result' && (() => {
                            const res = getResultData();
                            return (
                                <div className="flex-1 flex flex-col animate-in overflow-y-auto pb-4 gap-6">
                                    <div className="bg-white rounded-[64px] shadow-2xl overflow-hidden border border-slate-100 flex-1 flex flex-col lg:flex-row">
                                        <div className={`p-10 md:p-16 text-white flex flex-col justify-center items-center lg:w-[40%] shrink-0 bg-gradient-to-br ${RIASEC_TYPES[res.primary].gradient} relative overflow-hidden`}>
                                            <div className="relative z-10 text-center space-y-4">
                                                <p className="text-white/70 font-black text-sm tracking-[0.3em] uppercase">{userName} 的分析結果</p>
                                                <div className="w-24 h-24 bg-white/20 backdrop-blur-xl rounded-[32px] flex items-center justify-center mb-6 mx-auto shadow-inner">
                                                    <Icon name={RIASEC_TYPES[res.primary].icon} size={48} className="text-white" />
                                                </div>
                                                <h1 className="text-5xl md:text-7xl font-black tracking-tighter mb-2">{res.displayName}</h1>
                                                <p className="text-white/80 font-bold text-xl md:text-2xl">{res.title}</p>
                                                <div className="pt-6 inline-flex gap-2">
                                                    <span className="px-4 py-2 bg-white/20 backdrop-blur-md rounded-full text-xs font-black uppercase tracking-widest">{res.code} 碼</span>
                                                    <span className="px-4 py-2 bg-white/20 backdrop-blur-md rounded-full text-xs font-black uppercase tracking-widest">{res.percentage}% 分佈</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-8 md:p-16 flex-1 flex flex-col gap-12 overflow-y-auto">
                                            <div className="grid grid-cols-1 xl:grid-cols-2 gap-12 items-center">
                                                <div className="space-y-6 flex flex-col items-center">
                                                    <h3 className="text-slate-400 font-black tracking-[0.2em] text-xs uppercase text-center">何倫碼潛能分佈</h3>
                                                    <div className="bg-slate-50/50 p-6 rounded-[48px] border border-slate-100">
                                                        <RadarChart scores={scores} />
                                                    </div>
                                                </div>
                                                <div className="space-y-8">
                                                    <div className="space-y-4">
                                                        <h3 className="text-slate-400 font-black tracking-[0.2em] text-xs uppercase">性格核心特質</h3>
                                                        <div className="flex gap-4">
                                                            {[res.primary, res.secondary].map((char, idx) => (
                                                                <div key={char} className="flex-1 flex items-center gap-3 bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-lg ${idx === 0 ? 'scale-110' : 'scale-90 opacity-70'}`} style={{ backgroundColor: RIASEC_TYPES[char].color }}>
                                                                        <Icon name={RIASEC_TYPES[char].icon} size={24} />
                                                                    </div>
                                                                    <div>
                                                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">{idx === 0 ? '主要' : '次要'}</div>
                                                                        <div className="text-base font-black text-slate-800">{char} {RIASEC_TYPES[char].name}</div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div className="relative group bg-white p-6 md:p-8 rounded-3xl border border-slate-100">
                                                        <p className="text-slate-600 leading-relaxed font-bold italic text-lg text-center">「{res.description}」</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-8 border-t border-slate-50">
                                                <div className="space-y-4">
                                                    <div className="flex items-center gap-2 text-blue-500">
                                                        <Icon name="users" size={16} />
                                                        <span className="text-xs font-black uppercase tracking-widest">性格契合的名人</span>
                                                    </div>
                                                    <div className="flex flex-wrap gap-2">
                                                        {res.similar.map(n => <span key={n} className="px-5 py-2.5 bg-blue-50 text-blue-600 rounded-2xl text-sm font-black border border-blue-100">{n}</span>)}
                                                    </div>
                                                </div>
                                                <div className="space-y-4">
                                                    <div className="flex items-center gap-2 text-orange-500">
                                                        <Icon name="palette" size={16} />
                                                        <span className="text-xs font-black uppercase tracking-widest">跨界互補的名人</span>
                                                    </div>
                                                    <div className="flex flex-wrap gap-2">
                                                        {res.complement.map(n => <span key={n} className="px-5 py-2.5 bg-orange-50 text-orange-600 rounded-2xl text-sm font-black border border-orange-100">{n}</span>)}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex flex-col md:flex-row gap-4 mt-2 px-2">
                                        <button onClick={reset} className="flex-1 py-5 bg-white text-slate-600 font-black rounded-3xl border-2 border-slate-100 flex items-center justify-center gap-2 hover:bg-slate-50 active:scale-95 transition-all shadow-sm">
                                            <Icon name="refresh-cw" size={20} /> 重啟探索
                                        </button>
                                        <button className="flex-1 py-5 bg-slate-900 text-white font-black rounded-3xl shadow-2xl flex items-center justify-center gap-2 hover:bg-slate-800 active:scale-95 transition-all">
                                            <Icon name="share-2" size={20} /> 分享成果圖
                                        </button>
                                    </div>
                                </div>
                            );
                        })()}
                    </main>

                    <footer className="p-6 text-center shrink-0">
                        <p className="text-[10px] font-black text-slate-300 tracking-[0.4em] uppercase">© 2026 104 人力銀行生涯興趣測驗 | 公開訪問版本</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
